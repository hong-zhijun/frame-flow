name: FrameFlow
options:
  bundleIdPrefix: com.moyu
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "27.0"
  minimumXcodeGenVersion: "2.40"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  FrameFlow:
    type: application
    platform: macOS
    sources:
      - path: FrameFlow
        excludes:
          - Resources/Logos
      - path: FrameFlow/Resources/Logos
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moyu.FrameFlow
        INFOPLIST_FILE: FrameFlow/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: FrameFlow/Resources/FrameFlow.entitlements
        PRODUCT_NAME: FrameFlow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        INFOPLIST_KEY_CFBundleDisplayName: "FrameFlow"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
    entitlements:
      path: FrameFlow/Resources/FrameFlow.entitlements
